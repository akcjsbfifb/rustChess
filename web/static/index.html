<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Chess Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .board-grid {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
        }
        .square {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            border: 3px solid transparent;
            box-sizing: border-box;
        }
        .square.light { background-color: #eeeed2; }
        .square.dark { background-color: #769656; }
        .square:hover { filter: brightness(1.1); }
        .square.selected { background: #f7ec4f !important; border-color: #e6c200; }
        .square.last-move { border-color: #8aac46; }
        .square.valid-move::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
        }
        .square.valid-move.has-piece::after {
            background: transparent;
            border: 5px solid rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            width: 100%;
            height: 100%;
        }
        .piece {
            width: 58px;
            height: 58px;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body class="bg-[#302e2b] text-[#bababa] min-h-screen">
    <div class="max-w-[1200px] mx-auto p-5">
        <header class="flex justify-between items-center pb-5 mb-5 border-b border-[#3d3d3d]">
            <h1 class="text-white text-2xl">Rust Chess Engine</h1>
            <nav>
                <a href="/" class="text-[#bababa] px-4 py-2 rounded hover:bg-[#3d3d3d] hover:text-white bg-[#81b64c] text-white">Jugar</a>
                <a href="/debug.html" class="text-[#bababa] px-4 py-2 rounded hover:bg-[#3d3d3d] hover:text-white">Debug</a>
            </nav>
        </header>

        <main>
            <div class="flex gap-8 flex-wrap">
                <div class="flex-shrink-0">
                    <div id="turn-indicator" class="text-center py-2 text-lg font-bold text-white mb-2">Turno: Blancas</div>
                    <div id="board" class="select-none">
                        <!-- El tablero se genera con JavaScript -->
                    </div>
                    <div id="last-move" class="text-center mt-2 text-sm text-[#888]"></div>
                </div>

                <div class="flex-1 min-w-[280px]">
                    <div class="bg-[#262522] rounded-lg p-4 mb-4">
                        <h3 class="text-white text-base mb-3 pb-2 border-b border-[#3d3d3d]">Controles</h3>
                        <div class="flex flex-wrap gap-2">
                            <button id="btn-new-game" class="bg-[#81b64c] text-white px-4 py-2 rounded hover:bg-[#6a9c3a] text-sm">Nueva Partida</button>
                            <button id="btn-undo" class="bg-[#3d3d3d] text-white px-4 py-2 rounded hover:bg-[#4d4d4d] text-sm">Deshacer</button>
                            <button id="btn-flip" class="bg-[#3d3d3d] text-white px-4 py-2 rounded hover:bg-[#4d4d4d] text-sm">Voltear Tablero</button>
                        </div>
                    </div>

                    <div class="bg-[#262522] rounded-lg p-4 mb-4">
                        <h3 class="text-white text-base mb-3 pb-2 border-b border-[#3d3d3d]">Engine</h3>
                        <button id="btn-engine-play" class="bg-[#e6912c] text-white w-full py-3 rounded hover:bg-[#d4801e] text-base font-medium">Jugar Engine</button>
                        <div id="engine-info" class="mt-3 p-3 bg-[#1a1a1a] rounded font-mono text-xs min-h-[60px]"></div>
                    </div>

                    <div class="bg-[#262522] rounded-lg p-4 mb-4">
                        <h3 class="text-white text-base mb-3 pb-2 border-b border-[#3d3d3d]">Cargar Posición FEN</h3>
                        <div class="flex flex-col gap-2">
                            <input type="text" id="fen-load-input" placeholder="rnbqkbnr/pppppppp/8/8/4P3/8/PPPP1PPP/RNBQKBNR b KQkq e3 0 1" class="w-full bg-[#1a1a1a] border border-[#3d3d3d] rounded px-2 py-2 text-white font-mono text-xs">
                            <div class="flex gap-2">
                                <button id="btn-load-fen" class="flex-1 bg-[#81b64c] text-white px-4 py-2 rounded hover:bg-[#6a9c3a] text-sm">Cargar FEN</button>
                                <button id="btn-startpos" class="flex-1 bg-[#3d3d3d] text-white px-4 py-2 rounded hover:bg-[#4d4d4d] text-sm">Posición Inicial</button>
                            </div>
                        </div>
                    </div>

                    <div class="bg-[#262522] rounded-lg p-4 mb-4">
                        <h3 class="text-white text-base mb-3 pb-2 border-b border-[#3d3d3d]">Estado</h3>
                        <div id="status-box" class="bg-[#1a1a1a] rounded p-3 font-mono text-sm mb-3"><div>Conectando...</div></div>
                        <div class="flex flex-col gap-2">
                            <label class="text-xs text-[#888]">FEN:</label>
                            <div class="flex gap-2">
                                <input type="text" id="fen-input" readonly class="flex-1 bg-[#1a1a1a] border border-[#3d3d3d] rounded px-2 py-2 text-white font-mono text-xs">
                                <button id="btn-copy-fen" class="bg-[#4d4d4d] text-white px-3 py-2 rounded hover:bg-[#5d5d5d] text-xs">Copiar</button>
                            </div>
                        </div>
                    </div>

                    <div class="bg-[#262522] rounded-lg p-4">
                        <h3 class="text-white text-base mb-3 pb-2 border-b border-[#3d3d3d]">Movimientos Legales</h3>
                        <div id="moves-list" class="max-h-[200px] overflow-y-auto bg-[#1a1a1a] rounded p-2"></div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-8 pt-5 border-t border-[#3d3d3d] text-center">
            <div id="connection-status" class="inline-block px-3 py-1 rounded-full text-xs font-bold bg-[#f44336] text-white">Desconectado</div>
        </footer>
    </div>

    <script src="js/websocket.js"></script>
    <script src="js/board.js"></script>
</body>
</html>
