name: 🚀 Deploy to Production

on:
  push:
    tags:
      - 'v*'  # v1.0, v2.0, v1.2.3, etc.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📋 Checkout
        uses: actions/checkout@v4

      - name: 🎯 Deploy to Coolify
        env:
          WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          echo "🚀 Deploying version: ${{ github.ref_name }}"
          echo "🔗 Triggering Coolify deploy..."
          
          if [ -z "$WEBHOOK_URL" ]; then
            echo "❌ Error: COOLIFY_WEBHOOK_URL is not set!"
            echo "Please add it in Settings → Secrets → Actions"
            exit 1
          fi
          
          if [ -z "$API_TOKEN" ]; then
            echo "❌ Error: COOLIFY_API_TOKEN is not set!"
            echo "Please add it in Settings → Secrets → Actions"
            echo "Generate the token in Coolify: Settings → API Tokens"
            exit 1
          fi
          
          response=$(curl -s -X GET "$WEBHOOK_URL" \
            -H "Authorization: Bearer $API_TOKEN")
          
          echo "✅ Deploy triggered successfully!"
          echo "📤 Response: $response"
          echo ""
          echo "⏳ Your app will be live at: https://chess.moloeznik.me"
          echo "   (This may take 2-3 minutes to build and deploy)"
